<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VRISA — Versions</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Jost:wght@200;300&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        background: #1E140C;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        font-family: 'Jost', sans-serif;
      }

      .brand {
        font-family: 'Jost', sans-serif;
        font-weight: 200;
        font-size: 1rem;
        letter-spacing: 0.4em;
        color: #B8965A;
        text-transform: uppercase;
        margin-bottom: 4rem;
      }

      .versions {
        list-style: none;
        display: flex;
        flex-direction: column;
        gap: 0;
      }

      .version-row {
        display: flex;
        align-items: baseline;
        gap: 1.2rem;
        padding: 1.1rem 0;
        border-bottom: 1px solid rgba(196,120,74,0.1);
      }

      .version-row:first-child {
        border-top: 1px solid rgba(196,120,74,0.1);
      }

      .version-row a {
        text-decoration: none;
        display: flex;
        align-items: baseline;
        gap: 1.2rem;
        color: #F5EFE4;
        font-family: 'Jost', sans-serif;
        font-size: 0.6rem;
        font-weight: 200;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        transition: color 300ms ease;
      }

      .version-row a:hover { color: #C4784A; }

      .v-number {
        font-family: 'Cormorant Garamond', serif;
        font-weight: 300;
        font-size: 0.75rem;
        letter-spacing: 0.15em;
        color: rgba(245,239,228,0.4);
        min-width: 1.8rem;
      }

      .v-divider {
        color: rgba(196,120,74,0.3);
        font-size: 0.5rem;
      }

      .v-date {
        color: rgba(245,239,228,0.25);
      }

      .version-row a:hover .v-number,
      .version-row a:hover .v-divider,
      .version-row a:hover .v-date {
        color: inherit;
      }
    </style>
  </head>
  <body>
    <p class="brand">VRISA</p>
    <ul class="versions" id="version-list"></ul>

    <script>
      fetch('./versions.json')
        .then(r => r.json())
        .then(versions => {
          const list = document.getElementById('version-list')
          versions.forEach(v => {
            const li = document.createElement('li')
            li.className = 'version-row'
            li.innerHTML = `
              <a href="http://localhost:${v.port}" target="_blank">
                <span class="v-number">${v.folder.toUpperCase()}</span>
                <span class="v-divider">—</span>
                <span class="v-name">${v.name}</span>
                <span class="v-divider">—</span>
                <span class="v-date">${v.date}</span>
              </a>
            `
            list.appendChild(li)
          })
        })
        .catch(() => {
          document.getElementById('version-list').innerHTML =
            '<li style="color:rgba(245,239,228,0.3);font-size:0.6rem;letter-spacing:0.2em">No versions found</li>'
        })
    </script>
  </body>
</html>
